name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Security Tools
      run: pip install bandit safety

    - name: Run Bandit (SAST)
      # Scans code for common security issues
      # -x excludes the test file
      # -ll means "Only report Medium or High severity issues"
      run: bandit -r . -x ./test_app.py -ll

    - name: Run Safety (Dependency Scan)
      # Checks requirements.txt against a vulnerability database
      # Note: We'll create a requirements.txt in the next step
      run: |
        pip freeze > requirements.txt
        safety check -r requirements.txt

  test:
    needs: security-scan # The tests only run if the security scan passes!
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Run Pytest
      run: |
        pip install pytest
        pytest test_app.py