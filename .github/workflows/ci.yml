name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13.2'

    - name: Install Security Tools
      run: pip install bandit pip-audit

    - name: Run Bandit (SAST)
      # Excluding tests and ignoring low-severity "assert" warnings
      run: bandit -r . -x ./test_app.py -ll

    - name: Run pip-audit (SCA)
      # This scans your requirements.txt for known vulnerabilities
      run: pip-audit -r requirements.txt

  test:
    needs: security-scan # The tests only run if the security scan passes!
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Run Pytest
      run: |
        pip install pytest
        pytest test_app.py